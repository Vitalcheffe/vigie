# ============================================================
# VIGIE — Slack App Manifest (English, validated)
# ============================================================
# Create the app at https://api.slack.com/apps
# Choose "Create New App" -> "From an app manifest"
# Paste this YAML, click Create.
# ============================================================

display_information:
  name: Vigie
  description: "Slack agent for heatwave elder watch networks."
  background_color: "#4A154B"
  long_description: "Vigie is a Slack agent that turns any nonprofit or local-government workspace into an augmented watch center during heatwaves. It detects Meteo-France alerts, assigns phone check-ins to volunteers automatically, transcribes and semantically analyzes their returns in real time, and triggers critical escalations in under 5 minutes."

features:
  bot_user:
    display_name: Vigie
    first_name: Vigie
    last_name: ""
    always_online: true
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
  shortcuts:
    - name: "Report an anomaly"
      type: message
      callback_id: vigie_signal_anomaly
      description: "Report an anomaly on a beneficiary from any message"
    - name: "Reassign this beneficiary"
      type: message
      callback_id: vigie_reassign
      description: "Reassign the mentioned beneficiary to another volunteer"

oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - chat:write.customize
      - channels:read
      - channels:history
      - groups:read
      - groups:history
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      - users:read
      - users.profile:read
      - commands
      - app_mentions:read
      - reactions:read
      - reactions:write
      - files:read
      - files:write
      - assistant:write
      - pins:read
      - pins:write
      - usergroups:read
      - usergroups:write
      - team:read
      - workflows:read

settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.im
      - message.mpim
      - message.groups
      - app_mention
      - app_home_opened
      - app_uninstalled
      - team_join
      - reaction_added
      - reaction_removed
      - file_shared
      - user_change
      - channel_created
      - member_joined_channel
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  slash_commands:
    - command: /vigie
      description: "Main Vigie command"
      should_escape: false
      usage_hint: "/vigie [start|status|report|reset|help]"
    - command: /vigie-checkin
      description: "Start or update a volunteer check-in"
      should_escape: false
      usage_hint: "/vigie-checkin [beneficiary_id]"
    - command: /vigie-escalate
      description: "Trigger a manual escalation"
      should_escape: false
      usage_hint: "/vigie-escalate [beneficiary_id] [1|2|3]"
    - command: /vigie-report
      description: "Generate the daily report now"
      should_escape: false
    - command: /vigie-simulate
      description: "Run the canicule simulation scenario (demo)"
      should_escape: false
      usage_hint: "/vigie-simulate [scenario_name]"
